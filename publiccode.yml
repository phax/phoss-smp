publiccodeYmlVersion: "0"

name: phoss-smp
url: https://github.com/phax/phoss-smp
landingURL: https://github.com/phax/phoss-smp/wiki

softwareVersion: "8.1.6"
releaseDate: "2026-05-29"

platforms:
  - web

developmentStatus: stable
softwareType: standalone/web

categories:
  - billing-and-invoicing
  - communications
  - erp
  - it-security

description:
  en:
    shortDescription: >-
      Complete open-source SMP server for Peppol and OASIS BDXR.
    longDescription: >-
      phoss SMP is a complete SMP (Service Metadata Publisher) server that
      supports the Peppol SMP 1.x specification as well as the OASIS BDXR
      SMP 1.0 and 2.0 specifications. It comes with a management GUI and
      supports XML, SQL or MongoDB backends for simplified operations. It
      was the first SMP to be CEF eDelivery conformant. Docker containers
      are available for all backend types. phoss SMP is part of the Peppol
      solution stack and integrates with phoss AP and phase4 for a complete
      Peppol infrastructure.
    features:
      - Peppol SMP 1.x specification support
      - OASIS BDXR SMP 1.0 and 2.0 specification support
      - Management GUI for service metadata administration
      - XML backend for file-based persistence
      - SQL backend (MySQL, PostgreSQL, H2)
      - MongoDB backend
      - Docker containers for all backend types
      - CEF eDelivery conformant
    documentation: https://github.com/phax/phoss-smp/wiki

